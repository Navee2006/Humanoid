# ============================================================
#  VEDHA Robot Configuration
#  Hardware: Orin1 (perception) | Orin2 (VLM) | i7 (ROS)
# ============================================================

robot:
  name: Vedha
  language: en
  wake_words:
    - "hey vedha"
    - "vedha"
    - "வேதா"  # Tamil transliteration support

# ─── Network addresses ───────────────────────────────────────
network:
  orin1:
    host: "192.168.1.10"
    perception_port: 5550      # ZMQ PUB  → events to Orin2
    audio_stream_port: 5551    # ZMQ PUSH → raw PCM to Orin2
  orin2:
    host: "192.168.1.11"
    vlm_api_port: 8000         # FastAPI VLM server
    tool_result_port: 5552     # ZMQ PULL → tool results back
  i7:
    host: "192.168.1.12"
    ros_bridge_port: 9090      # rosbridge_websocket
    tool_executor_port: 8001   # FastAPI tool executor

# ─── Ollama / VLM (Orin2) ────────────────────────────────────
vlm:
  ollama_host: "http://localhost:11434"
  # gemma3:4b – lean, fast on Orin2, no native vision/tool-call
  # Tool calling handled via JSON-in-prompt parsing
  model: "gemma3:4b"
  max_tokens: 512
  temperature: 0.7
  context_window: 8192          # gemma3 has 128k context; keep conservative
  # How many conversation turns to keep in memory
  history_turns: 6

# ─── Perception (Orin1) ──────────────────────────────────────
perception:
  camera:
    device: 0                    # /dev/video0 or CSI index
    width: 640
    height: 480
    fps: 30
    # Frame sent to VLM on each interaction (not streaming)
    capture_on_trigger: true

  wake_word:
    # openWakeWord model path (see scripts/download_models.sh)
    model_path: "models/hey_vedha.onnx"
    # Fallback to porcupine if openWakeWord unavailable
    engine: "openwakeword"       # openwakeword | porcupine
    porcupine_key: "YOUR_PORCUPINE_KEY"
    threshold: 0.7
    chunk_size: 1280             # samples @ 16kHz

  person_detection:
    model: "yolov8n.pt"          # nano model fits Orin1 RAM
    confidence: 0.55
    # Only trigger welcome if no person was seen for this many seconds
    cooldown_seconds: 30
    # Person must be detected for N consecutive frames before trigger
    min_consecutive_frames: 3

# ─── STT – Sarvam Saaras (Orin1 → cloud) ────────────────────
stt:
  provider: "sarvam"
  sarvam_api_key: "YOUR_SARVAM_API_KEY"
  sarvam_endpoint: "https://api.sarvam.ai/speech-to-text"
  language_code: "en-IN"        # or ta-IN for Tamil
  model: "saaras:v2"
  # Max recording duration after wake word
  max_listen_seconds: 10
  # Silence threshold to stop recording (seconds)
  silence_timeout: 1.5
  sample_rate: 16000
  channels: 1

# ─── TTS / Speaker (i7) ──────────────────────────────────────
tts:
  engine: "sarvam_bulbul"
  sarvam_api_key: "YOUR_SARVAM_API_KEY"   # same key as STT
  sarvam_tts_endpoint: "https://api.sarvam.ai/text-to-speech"
  model: "bulbul:v3"
  speaker: "meera"             # available: meera | pavithra | maitreyi | arvind | amol
  language_code: "en-IN"       # en-IN | ta-IN | hi-IN etc.
  pitch: 0                     # -10 to 10
  pace: 1.1                    # 0.5 to 2.0
  loudness: 1.5                # 0.5 to 3.0
  enable_preprocessing: true   # normalize numbers, abbreviations
  output_device: "default"     # ALSA device on i7

# ─── ROS (i7) ────────────────────────────────────────────────
ros:
  namespace: "/vedha"
  cmd_vel_topic: "/cmd_vel"
  gesture_action: "/vedha/gesture"
  head_control_topic: "/vedha/head/cmd"
  # Speeds
  linear_speed: 0.3             # m/s
  angular_speed: 0.5            # rad/s

# ─── Tools available to VLM ──────────────────────────────────
tools:
  enabled:
    - welcome_person
    - speak
    - capture_image
    - move_forward
    - move_backward
    - turn_left
    - turn_right
    - wave_hand
    - nod_head
    - shake_head
    - look_at_person
